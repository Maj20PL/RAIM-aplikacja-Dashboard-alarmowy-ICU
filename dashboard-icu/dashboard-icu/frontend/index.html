<!DOCTYPE html>
<html>
<head>
    <title>ICU Dashboard</title>
    <link rel="stylesheet" href="styl.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>ICU Dashboard</h1>

<div class="page-gird">
    <div class="wiersz-overview">
        <article class="karta-stanu hr-kart" id="hrKart">
            <span class="etyk-stanu">HR</span>
            <strong id="hrValue">-</strong>
        </article>
        <article class="karta-stanu spo2-kart">
            <span class="etyk-stanu">SpO2</span>
            <strong id="spo2Value">-</strong>
            <span class="jednostka-stanu">%</span>
        </article>
        <article class="karta-stanu status-kart normal" id="statusKart">
            <span class="etyk-stanu">Status</span>
            <strong id="statusValue">Normal</strong>
            <span class="notka-statusu">Live ICU monitor</span>
        </article>
    </div>

    <div class="live-meta">
        <span id="lastUpdate">Oczekuje na dane ...</span>
    </div>

    <section class="charts-grid">
        <div class="chart-card">
            <p class="chart-title">Trend Tętna</p>
            <canvas id="hrChart"></canvas>
        </div>
        <div class="chart-card">
            <p class="chart-title">Trend Nasycenia tlenem</p>
            <canvas id="spo2Chart"></canvas>
        </div>
    </section>

    <section class="alarms-panel">
        <h2>AKTYWNE ALARMY</h2>
        <ul id="alarms" class="alarm-list"></ul>
    </section>
</div>

<script src="skrypt.js"></script>
</body>
</html>
